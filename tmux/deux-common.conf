# ============================================================
# Deux · tmux theme — shared styling
# Expects DEUX_* variables to be defined by the caller
# (deux-dark.conf or deux-light.conf). Do not source directly.
# ============================================================

set -g status on
set -g status-interval 5
set -g status-justify left

# True color so the pastel hexes render faithfully.
set -as terminal-features ",*:RGB"

# ── Status bar ──────────────────────────────────────────────
set -g status-style "bg=${DEUX_PANEL},fg=${DEUX_FG}"

# Session name on the left, in an amber/gold "function" badge.
set -g status-left "#[bg=${DEUX_FN},fg=${DEUX_BG},bold] #S #[bg=${DEUX_PANEL},fg=${DEUX_PANEL}] "
set -g status-left-length 40

# Date / time on the right.
set -g status-right "#[fg=${DEUX_FG_MUTED}] %Y-%m-%d #[fg=${DEUX_LINE}]│#[fg=${DEUX_FG}] %H:%M #[bg=${DEUX_LINE},fg=${DEUX_FG},bold] #h "
set -g status-right-length 60

# ── Windows ─────────────────────────────────────────────────
set -g window-status-separator ""
set -g window-status-format "#[bg=${DEUX_PANEL},fg=${DEUX_FG_MUTED}] #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-current-format "#[bg=${DEUX_NUM},fg=${DEUX_BG},bold] #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-activity-style "fg=${DEUX_KW}"
set -g window-status-bell-style "fg=${DEUX_ERROR},bold"

# ── Panes ───────────────────────────────────────────────────
set -g pane-border-style "fg=${DEUX_LINE}"
set -g pane-active-border-style "fg=${DEUX_FN}"
set -g display-panes-colour "${DEUX_FG_MUTED}"
set -g display-panes-active-colour "${DEUX_NUM}"

# ── Messages / command prompt ───────────────────────────────
set -g message-style "bg=${DEUX_BG_ALT},fg=${DEUX_FG}"
set -g message-command-style "bg=${DEUX_BG_ALT},fg=${DEUX_FN}"

# ── Copy mode ───────────────────────────────────────────────
set -g mode-style "bg=${DEUX_SELECTION},fg=${DEUX_FG}"
set -g copy-mode-match-style "bg=${DEUX_FN},fg=${DEUX_BG}"
set -g copy-mode-current-match-style "bg=${DEUX_NUM},fg=${DEUX_BG},bold"
set -g copy-mode-mark-style "bg=${DEUX_KW},fg=${DEUX_BG}"

# ── Clock mode ──────────────────────────────────────────────
set -g clock-mode-colour "${DEUX_FN}"
set -g clock-mode-style 24
