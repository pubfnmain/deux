syntax = "proto3";

package deux.v1;

import "deux/v1/authorize.proto";
import "deux/v1/finalize.proto";
import "deux/v1/acknowledgement.proto";

service CenterService {
  rpc Authorize (AuthorizeRequest) returns (AcknowledgementResponse);
  rpc Finalize (FinalizeRequest) returns (AcknowledgementResponse);
}
